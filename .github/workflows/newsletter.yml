name: Send Weekly Newsletter

on:
  schedule:
    # Target: Saturday ~05:00 Australia/Sydney. GitHub cron is UTC
    # only and does not adjust for DST, so a fixed UTC time fires
    # at Sat 05:00 Sydney during AEST (Apr–Oct) and Sat 06:00 Sydney
    # during AEDT (Oct–Apr).
    #
    # GitHub Actions schedule events remain best-effort. Empirically
    # on this repo they have been delayed 3–6 hours and outright
    # dropped (6/6). There is no workflow-file change that fully
    # fixes this; the best we can do with GHA alone is fire several
    # spaced attempts and rely on send_newsletter.mjs's 4-day
    # idempotency gate to drop duplicates. If a week ever needs
    # rescuing, dispatch the workflow manually from the Actions tab.
    - cron: '0 19 * * 5'   # Fri 19:00 UTC = Sat 05:00 Sydney AEST (primary)
    - cron: '0 22 * * 5'   # Fri 22:00 UTC = Sat 08:00 Sydney AEST (morning retry)
    - cron: '0 3 * * 6'    # Sat 03:00 UTC = Sat 13:00 Sydney AEST (afternoon retry)
    - cron: '0 23 * * 6'   # Sat 23:00 UTC = Sun 09:00 Sydney AEST (Sunday safety net)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not send via Resend, just log what would be sent)'
        type: boolean
        default: false
      force:
        description: 'Force send even if a broadcast was sent within the last 4 days (bypasses the idempotency gate). Use when manually catching up a missed Saturday cron.'
        type: boolean
        default: false
      since_date:
        description: 'Optional: ISO date (YYYY-MM-DD) to override last_sent_at for this run only. Useful for previewing the email layout without rewinding state file.'
        type: string
        required: false
      preview_to:
        description: 'Optional: send a one-off transactional preview to these addresses (comma-separated, e.g. you@x.com,friend@y.com) instead of broadcasting to the audience.'
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Send newsletter
        working-directory: scripts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL: newsletter@chunghaolee.com
          FROM_NAME: Chung-Hao Lee
          SITE_URL: https://chunghaolee.com
          RSS_URL: https://chunghaolee.com/index.xml
          STATE_FILE: ../data/newsletter_state.json
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          FORCE: ${{ inputs.force && 'true' || 'false' }}
          OVERRIDE_SINCE: ${{ inputs.since_date }}
          PREVIEW_TO: ${{ inputs.preview_to }}
        run: node send_newsletter.mjs

      # Skip the state commit when we did a dry-run OR when this was a
      # one-off preview send — neither should advance the audience's
      # "last broadcast received" cursor.
      - name: Commit updated state
        if: ${{ !inputs.dry_run && !inputs.preview_to }}
        run: |
          if git diff --quiet data/newsletter_state.json; then
            echo "No state change — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/newsletter_state.json
          git commit -m "chore(newsletter): update last_sent_at after weekly send"
          git push
