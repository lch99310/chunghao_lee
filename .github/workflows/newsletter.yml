name: Send Weekly Newsletter

on:
  schedule:
    # Saturday 01:00 UTC = Saturday 09:00 Asia/Taipei
    - cron: '0 1 * * 6'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not send via Resend, just log what would be sent)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Send newsletter
        working-directory: scripts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL: newsletter@chunghaolee.com
          FROM_NAME: Chung-Hao Lee
          SITE_URL: https://chunghaolee.com
          RSS_URL: https://chunghaolee.com/index.xml
          STATE_FILE: ../data/newsletter_state.json
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
        run: node send_newsletter.mjs

      - name: Commit updated state
        if: ${{ !inputs.dry_run }}
        run: |
          if git diff --quiet data/newsletter_state.json; then
            echo "No state change — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/newsletter_state.json
          git commit -m "chore(newsletter): update last_sent_at after weekly send"
          git push
