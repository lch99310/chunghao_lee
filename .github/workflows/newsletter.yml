name: Send Weekly Newsletter

on:
  schedule:
    # GitHub Actions schedule events are best-effort and routinely
    # dropped at *peak* times — the start of every hour and every
    # half hour are the worst. The previous version of this workflow
    # had four attempts that all sat on :00 or :30, so when GHA shed
    # load at the top of the hour they tended to drop together and
    # the whole Saturday got skipped (5/16 and 5/30 both missed).
    #
    # Mitigation:
    #   1. Schedule on off-peak odd minutes (avoid :00 / :30 / :15 / :45).
    #   2. Spread attempts widely across Saturday so a regional
    #      GHA hot patch can't take them all out at once.
    #   3. Add a Sunday-morning safety net — if every Saturday slot
    #      is dropped, this still catches the week before Monday.
    #
    # send_newsletter.mjs has a 4-day idempotency gate, so multiple
    # attempts landing in the same window are safe (the second one
    # logs "< 4d threshold" and exits without broadcasting).
    - cron: '7 1 * * 6'    # Sat 09:07 Asia/Taipei (primary)
    - cron: '23 2 * * 6'   # Sat 10:23 Asia/Taipei (mid-morning retry)
    - cron: '47 5 * * 6'   # Sat 13:47 Asia/Taipei (afternoon retry)
    - cron: '13 13 * * 6'  # Sat 21:13 Asia/Taipei (evening retry)
    - cron: '37 1 * * 0'   # Sun 09:37 Asia/Taipei (Sunday safety net)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not send via Resend, just log what would be sent)'
        type: boolean
        default: false
      force:
        description: 'Force send even if a broadcast was sent within the last 4 days (bypasses the idempotency gate). Use when manually catching up a missed Saturday cron.'
        type: boolean
        default: false
      since_date:
        description: 'Optional: ISO date (YYYY-MM-DD) to override last_sent_at for this run only. Useful for previewing the email layout without rewinding state file.'
        type: string
        required: false
      preview_to:
        description: 'Optional: send a one-off transactional preview to these addresses (comma-separated, e.g. you@x.com,friend@y.com) instead of broadcasting to the audience.'
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Send newsletter
        working-directory: scripts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          FROM_EMAIL: newsletter@chunghaolee.com
          FROM_NAME: Chung-Hao Lee
          SITE_URL: https://chunghaolee.com
          RSS_URL: https://chunghaolee.com/index.xml
          STATE_FILE: ../data/newsletter_state.json
          DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
          FORCE: ${{ inputs.force && 'true' || 'false' }}
          OVERRIDE_SINCE: ${{ inputs.since_date }}
          PREVIEW_TO: ${{ inputs.preview_to }}
        run: node send_newsletter.mjs

      # Skip the state commit when we did a dry-run OR when this was a
      # one-off preview send — neither should advance the audience's
      # "last broadcast received" cursor.
      - name: Commit updated state
        if: ${{ !inputs.dry_run && !inputs.preview_to }}
        run: |
          if git diff --quiet data/newsletter_state.json; then
            echo "No state change — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/newsletter_state.json
          git commit -m "chore(newsletter): update last_sent_at after weekly send"
          git push
