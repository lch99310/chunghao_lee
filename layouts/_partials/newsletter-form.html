{{- with site.Params.newsletter -}}
{{- if .enabled -}}
<section class="newsletter-form" aria-labelledby="newsletter-heading">
  <h3 id="newsletter-heading">📬 Subscribe / 訂閱 Newsletter</h3>
  <p class="newsletter-desc">
    Get a weekly digest of new posts &amp; portfolio updates, every Saturday morning (Asia/Taipei).<br>
    每週六早上(台灣時間)收到新文章與作品集更新摘要。
  </p>
  <form id="newsletter-subscribe-form" class="newsletter-fields" novalidate>
    <label for="newsletter-email" class="newsletter-label">
      ✉️ Your email / 你的 email
    </label>
    <div class="newsletter-row">
      <input id="newsletter-email" type="email" name="email" required autocomplete="email"
             placeholder="name@example.com" aria-label="Your email address">
      <input type="text" name="website" tabindex="-1" autocomplete="off"
             class="newsletter-honeypot" aria-hidden="true">
      <button type="submit">Subscribe / 訂閱</button>
    </div>
  </form>
  <p id="newsletter-status" class="newsletter-status" role="status" aria-live="polite"></p>
</section>

<style>
  .newsletter-form {
    margin: 2.5rem auto 1rem;
    padding: 1.25rem 1.5rem;
    border: 1px solid var(--color-neutral-300, #d1d5db);
    border-radius: 0.5rem;
    background: var(--color-neutral-50, #f9fafb);
    max-width: 42rem;
  }
  .dark .newsletter-form {
    border-color: var(--color-neutral-700, #374151);
    background: var(--color-neutral-800, #1f2937);
  }
  .newsletter-form h3 { margin: 0 0 0.4rem; font-size: 1rem; }
  .newsletter-desc { margin: 0 0 1rem; font-size: 0.875rem; line-height: 1.5; opacity: 0.85; }
  .newsletter-label {
    display: block;
    margin: 0 0 0.4rem;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    opacity: 0.95;
  }
  .newsletter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .newsletter-row input[type="email"] {
    flex: 1 1 14rem; min-width: 0;
    padding: 0.6rem 0.85rem; font-size: 0.9375rem;
    border: 2px solid var(--color-primary-500, #2563eb);
    border-radius: 0.375rem;
    background: var(--color-neutral-0, #fff); color: #111827;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .newsletter-row input[type="email"]:focus {
    outline: none;
    border-color: var(--color-primary-700, #1d4ed8);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
  }
  .newsletter-row input[type="email"]::placeholder { color: #9ca3af; }
  .dark .newsletter-row input[type="email"] {
    border-color: var(--color-primary-400, #60a5fa);
    background: var(--color-neutral-900, #0f172a);
    color: #f9fafb;
  }
  .dark .newsletter-row input[type="email"]::placeholder { color: #6b7280; }
  .newsletter-row button {
    padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500;
    background: var(--color-primary-600, #0a66c2); color: #fff;
    border: 0; border-radius: 0.375rem; cursor: pointer;
    transition: background 0.15s;
  }
  .newsletter-row button:hover { background: var(--color-primary-700, #084d92); }
  .newsletter-row button:disabled { opacity: 0.6; cursor: not-allowed; }
  .newsletter-honeypot { position: absolute !important; left: -9999px !important; width: 1px; height: 1px; opacity: 0; }
  .newsletter-status { margin: 0.6rem 0 0; font-size: 0.875rem; min-height: 1.2em; }
  .newsletter-status.is-ok { color: #16a34a; }
  .newsletter-status.is-err { color: #dc2626; }
</style>

<script>
(function () {
  var form = document.getElementById('newsletter-subscribe-form');
  if (!form) return;
  var status = document.getElementById('newsletter-status');
  var btn = form.querySelector('button[type="submit"]');
  var endpoint = {{ .subscribeEndpoint | jsonify }};

  function setStatus(msg, kind) {
    status.textContent = msg;
    status.classList.remove('is-ok', 'is-err');
    if (kind) status.classList.add(kind);
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var data = new FormData(form);
    var email = String(data.get('email') || '').trim();
    var honeypot = String(data.get('website') || '');
    if (!email) return;
    btn.disabled = true;
    setStatus('Sending… / 寄送中…');

    fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, honeypot: honeypot })
    })
    .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
    .then(function (res) {
      btn.disabled = false;
      if (res.ok && res.body && res.body.ok) {
        setStatus('✅ Check your inbox to confirm. / 請至信箱點選確認連結。', 'is-ok');
        form.reset();
      } else {
        var err = res.body && res.body.error;
        var msg = err === 'invalid_email'
          ? '⚠️ Invalid email format. / Email 格式不正確。'
          : '⚠️ Something went wrong. Please try again later. / 發生錯誤,請稍後再試。';
        setStatus(msg, 'is-err');
      }
    })
    .catch(function (err) {
      btn.disabled = false;
      // Log details so DevTools shows the real cause (CORS, DNS, offline, etc.)
      console.error('[newsletter] subscribe failed:', err, 'endpoint:', endpoint);
      setStatus('⚠️ Network error. Please try again. / 網路錯誤,請稍後再試。', 'is-err');
    });
  });
})();
</script>
{{- end -}}
{{- end -}}
