{{ $sharingLinks := .Params.sharingLinks | default (.Site.Params.article.sharingLinks | default false) }}
{{ $links := site.Data.sharing }}
<section class="flex flex-row flex-wrap justify-center pt-4 text-xl">
  {{ with $sharingLinks }}
    {{ range . }}
      {{ with index $links . }}
        <a
          class="m-1 inline-block min-w-[2.4rem] rounded bg-neutral-300 p-1 text-center text-neutral-700 hover:bg-primary-500 hover:text-neutral dark:bg-neutral-700 dark:text-neutral-300 dark:hover:bg-primary-400 dark:hover:text-neutral-800"
          href="{{ printf .url $.Permalink $.Title }}"
          title="{{ i18n .title }}"
          aria-label="{{ i18n .title }}"
          target="_blank"
          rel="noopener noreferrer"
          >{{ partial "icon.html" .icon }}</a
        >
      {{ end }}
    {{ end }}
  {{ end }}
  <button
    type="button"
    class="copy-link-btn relative m-1 inline-block min-w-[2.4rem] rounded bg-neutral-300 p-1 text-center text-neutral-700 hover:bg-primary-500 hover:text-neutral dark:bg-neutral-700 dark:text-neutral-300 dark:hover:bg-primary-400 dark:hover:text-neutral-800"
    data-url="{{ .Permalink }}"
    data-label-default="複製連結 / Copy link"
    data-label-copied="已複製 / Copied!"
    title="複製連結 / Copy link"
    aria-label="複製連結 / Copy link"
  >
    <span class="copy-link-icon-default">{{ partial "icon.html" "link" }}</span>
    <span class="copy-link-icon-copied hidden">{{ partial "icon.html" "check" }}</span>
    <span class="copy-link-toast pointer-events-none absolute left-1/2 top-full z-10 mt-1 hidden -translate-x-1/2 whitespace-nowrap rounded bg-neutral-800 px-2 py-1 text-xs text-neutral-100 dark:bg-neutral-200 dark:text-neutral-800">已複製 / Copied!</span>
  </button>
</section>
<script>
  (function () {
    var buttons = document.querySelectorAll('.copy-link-btn');
    if (!buttons.length) return;

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'absolute';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
      document.body.removeChild(ta);
      return ok;
    }

    buttons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var url = btn.getAttribute('data-url') || window.location.href;
        var iconDefault = btn.querySelector('.copy-link-icon-default');
        var iconCopied = btn.querySelector('.copy-link-icon-copied');
        var toast = btn.querySelector('.copy-link-toast');
        var labelCopied = btn.getAttribute('data-label-copied');
        var labelDefault = btn.getAttribute('data-label-default');

        var showCopied = function () {
          if (iconDefault) iconDefault.classList.add('hidden');
          if (iconCopied) iconCopied.classList.remove('hidden');
          if (toast) toast.classList.remove('hidden');
          btn.setAttribute('title', labelCopied);
          btn.setAttribute('aria-label', labelCopied);
          setTimeout(function () {
            if (iconDefault) iconDefault.classList.remove('hidden');
            if (iconCopied) iconCopied.classList.add('hidden');
            if (toast) toast.classList.add('hidden');
            btn.setAttribute('title', labelDefault);
            btn.setAttribute('aria-label', labelDefault);
          }, 2000);
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(showCopied, function () {
            if (fallbackCopy(url)) showCopied();
          });
        } else if (fallbackCopy(url)) {
          showCopied();
        }
      });
    });
  })();
</script>
