<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="540" fill="#f7f4ee"/>
  <text x="60" y="72" fill="#2c2a27" font-size="30" font-weight="700">Sixty Years of Human–Machine Interaction</text>
  <text x="60" y="106" fill="#6b6560" font-size="19">Every step, the machine grew a shape that yields to the human.</text>

  <!-- baseline -->
  <line x1="120" y1="300" x2="1120" y2="300" stroke="#d9d2c6" stroke-width="3"/>
  <polygon points="1120,300 1104,292 1104,308" fill="#d9d2c6"/>

  <!-- nodes: 5 -->
  <!-- helper spacing: 150, 375, 600, 825, 1080 -->
  <g text-anchor="middle">
    <!-- 1961 CLI -->
    <circle cx="150" cy="300" r="9" fill="#a79e90"/>
    <text x="150" y="252" fill="#2c2a27" font-size="22" font-weight="700">1961</text>
    <text x="150" y="344" fill="#47606e" font-size="18" font-weight="600">Command Line</text>
    <text x="150" y="370" fill="#8a837a" font-size="15">memorize &amp; type</text>

    <!-- 1984 GUI -->
    <circle cx="375" cy="300" r="9" fill="#a79e90"/>
    <text x="375" y="252" fill="#2c2a27" font-size="22" font-weight="700">1984</text>
    <text x="375" y="344" fill="#47606e" font-size="18" font-weight="600">Graphical UI</text>
    <text x="375" y="370" fill="#8a837a" font-size="15">recognize &amp; click</text>

    <!-- 2007 Touch -->
    <circle cx="600" cy="300" r="9" fill="#a79e90"/>
    <text x="600" y="252" fill="#2c2a27" font-size="22" font-weight="700">2007</text>
    <text x="600" y="344" fill="#47606e" font-size="18" font-weight="600">Multi-touch</text>
    <text x="600" y="370" fill="#8a837a" font-size="15">reach out &amp; touch</text>

    <!-- 2022 Chat -->
    <circle cx="825" cy="300" r="9" fill="#a79e90"/>
    <text x="825" y="252" fill="#2c2a27" font-size="22" font-weight="700">2022</text>
    <text x="825" y="344" fill="#47606e" font-size="18" font-weight="600">Chat box</text>
    <text x="825" y="370" fill="#8a837a" font-size="15">describe &amp; wait</text>

    <!-- 2026 AI Pointer (highlighted) -->
    <circle cx="1080" cy="300" r="14" fill="#bd7a2c"/>
    <circle cx="1080" cy="300" r="24" fill="none" stroke="#bd7a2c" stroke-width="2" opacity="0.5"/>
    <text x="1080" y="248" fill="#bd7a2c" font-size="22" font-weight="700">2026</text>
    <text x="1080" y="346" fill="#bd7a2c" font-size="18" font-weight="700">AI Pointer</text>
    <text x="1080" y="372" fill="#a06a2a" font-size="15">point &amp; speak</text>
  </g>

  <text x="600" y="470" fill="#8a837a" font-size="17" text-anchor="middle">The chat box (2022) briefly asked humans to memorize prompts — the AI Pointer hands the burden back to the machine.</text>
</svg>
