<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="620" fill="#f7f4ee"/>
  <text x="60" y="72" fill="#2c2a27" font-size="30" font-weight="700">Two Complementary Engines</text>
  <text x="60" y="106" fill="#6b6560" font-size="19">Don't pick a side — be precise about what each is worth.</text>

  <!-- LEFT: Intent Engine (AI) -->
  <g transform="translate(70,150)">
    <rect width="440" height="380" rx="18" fill="#ffffff" stroke="#e0c9a6" stroke-width="2.5"/>
    <text x="34" y="52" fill="#bd7a2c" font-size="15" font-weight="700" letter-spacing="1.5">INTENT ENGINE</text>
    <text x="34" y="104" fill="#2c2a27" font-size="40" font-weight="800">AI</text>
    <line x1="34" y1="130" x2="406" y2="130" stroke="#f0e4d2" stroke-width="2"/>
    <text x="34" y="172" fill="#6b6560" font-size="17">Input &#8594; a fuzzy goal</text>
    <text x="34" y="200" fill="#9c958c" font-size="15">"you can say the what, not the steps"</text>
    <text x="34" y="256" fill="#2c2a27" font-size="19" font-weight="600">Strengths</text>
    <g fill="#47606e" font-size="17">
      <circle cx="42" cy="290" r="4" fill="#bd7a2c"/><text x="60" y="296">Understand ambiguous intent</text>
      <circle cx="42" cy="322" r="4" fill="#bd7a2c"/><text x="60" y="328">Synthesize across contexts</text>
      <circle cx="42" cy="354" r="4" fill="#bd7a2c"/><text x="60" y="360">Generate from nothing</text>
    </g>
  </g>

  <!-- RIGHT: Manipulation Engine (GUI) -->
  <g transform="translate(690,150)">
    <rect width="440" height="380" rx="18" fill="#ffffff" stroke="#c3d0d6" stroke-width="2.5"/>
    <text x="34" y="52" fill="#47606e" font-size="15" font-weight="700" letter-spacing="1.5">MANIPULATION ENGINE</text>
    <text x="34" y="104" fill="#2c2a27" font-size="40" font-weight="800">GUI</text>
    <line x1="34" y1="130" x2="406" y2="130" stroke="#e2e9ec" stroke-width="2"/>
    <text x="34" y="172" fill="#6b6560" font-size="17">Input &#8594; a clear action</text>
    <text x="34" y="200" fill="#9c958c" font-size="15">"you know exactly what to do"</text>
    <text x="34" y="256" fill="#2c2a27" font-size="19" font-weight="600">Strengths</text>
    <g fill="#47606e" font-size="17">
      <circle cx="42" cy="290" r="4" fill="#47606e"/><text x="60" y="296">Precise reference (this, not that)</text>
      <circle cx="42" cy="322" r="4" fill="#47606e"/><text x="60" y="328">Instant feedback</text>
      <circle cx="42" cy="354" r="4" fill="#47606e"/><text x="60" y="360">Raw speed of pointing</text>
    </g>
  </g>

  <!-- middle notch: integration zone -->
  <g transform="translate(600,340)">
    <circle cx="0" cy="0" r="42" fill="#f7f4ee" stroke="#bd7a2c" stroke-width="2.5" stroke-dasharray="6 6"/>
    <text x="0" y="10" fill="#bd7a2c" font-size="34" font-weight="800" text-anchor="middle">?</text>
  </g>
  <text x="600" y="408" fill="#a06a2a" font-size="15" font-weight="600" text-anchor="middle">integration</text>
  <text x="600" y="428" fill="#a06a2a" font-size="15" font-weight="600" text-anchor="middle">zone</text>

  <text x="600" y="576" fill="#8a837a" font-size="17" text-anchor="middle">The future interface doesn't choose one engine. It fits them together.</text>
</svg>
