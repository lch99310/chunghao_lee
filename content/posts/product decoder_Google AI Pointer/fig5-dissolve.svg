<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="560" fill="#f7f4ee"/>
  <text x="60" y="72" fill="#2c2a27" font-size="30" font-weight="700">The Endgame: an Interface That Disappears</text>
  <text x="60" y="106" fill="#6b6560" font-size="19">From a place you go to — to a layer that is simply everywhere.</text>

  <!-- LEFT: AI as a separate door / app -->
  <g transform="translate(120,170)">
    <text x="170" y="-14" fill="#47606e" font-size="17" font-weight="600" text-anchor="middle">TODAY</text>
    <!-- door frame -->
    <rect x="120" y="0" width="120" height="230" rx="8" fill="#ffffff" stroke="#47606e" stroke-width="3"/>
    <rect x="132" y="14" width="96" height="190" rx="4" fill="#eef2f4"/>
    <text x="180" y="118" fill="#47606e" font-size="30" font-weight="800" text-anchor="middle">AI</text>
    <circle cx="216" cy="118" r="4" fill="#47606e"/>
    <!-- little person walking toward it -->
    <g transform="translate(40,120)" stroke="#8a837a" stroke-width="3" fill="none" stroke-linecap="round">
      <circle cx="0" cy="-34" r="11" fill="#8a837a" stroke="none"/>
      <line x1="0" y1="-22" x2="0" y2="6"/>
      <line x1="0" y1="-12" x2="16" y2="-2"/>
      <line x1="0" y1="-12" x2="-14" y2="-4"/>
      <line x1="0" y1="6" x2="14" y2="30"/>
      <line x1="0" y1="6" x2="-12" y2="30"/>
    </g>
    <text x="150" y="272" fill="#8a837a" font-size="17" text-anchor="middle">A place you go to.</text>
  </g>

  <!-- arrow -->
  <g transform="translate(590,290)">
    <line x1="0" y1="0" x2="70" y2="0" stroke="#bd7a2c" stroke-width="3"/>
    <polygon points="70,0 56,-8 56,8" fill="#bd7a2c"/>
  </g>

  <!-- RIGHT: AI dissolved into a membrane under every UI row -->
  <g transform="translate(720,170)">
    <text x="200" y="-14" fill="#bd7a2c" font-size="17" font-weight="600" text-anchor="middle">TOMORROW</text>
    <!-- four stacked UI rows, each with an amber under-membrane -->
    <g>
      <rect x="0" y="6" width="400" height="42" rx="8" fill="#f6ead6"/>
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <line x1="20" y1="21" x2="150" y2="21" stroke="#ece7dd" stroke-width="9" stroke-linecap="round"/>
    </g>
    <g transform="translate(0,60)">
      <rect x="0" y="6" width="400" height="42" rx="8" fill="#f6ead6"/>
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <line x1="20" y1="21" x2="220" y2="21" stroke="#ece7dd" stroke-width="9" stroke-linecap="round"/>
    </g>
    <g transform="translate(0,120)">
      <rect x="0" y="6" width="400" height="42" rx="8" fill="#f6ead6"/>
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <line x1="20" y1="21" x2="110" y2="21" stroke="#ece7dd" stroke-width="9" stroke-linecap="round"/>
    </g>
    <g transform="translate(0,180)">
      <rect x="0" y="6" width="400" height="42" rx="8" fill="#f6ead6"/>
      <rect x="0" y="0" width="400" height="42" rx="8" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <line x1="20" y1="21" x2="180" y2="21" stroke="#ece7dd" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="410" y="120" fill="#bd7a2c" font-size="14" font-weight="700" transform="rotate(90,410,120)" text-anchor="middle">AI woven under every layer</text>
    <text x="200" y="272" fill="#a06a2a" font-size="17" text-anchor="middle">A layer under everything.</text>
  </g>

  <text x="600" y="524" fill="#8a837a" font-size="17" text-anchor="middle">A good interface disappears — the way a good translation makes you forget the language.</text>
</svg>
