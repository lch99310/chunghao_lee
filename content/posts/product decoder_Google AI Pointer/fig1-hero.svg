    </g>
    <!-- w4 -->
    <g transform="translate(900,168)">
      <rect width="250" height="360" rx="14" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <circle cx="26" cy="30" r="8" fill="#9a6cb0"/>
      <text x="52" y="36" fill="#9c958c" font-size="15">Assistant D</text>
      <line x1="24" y1="70" x2="150" y2="70" stroke="#ece7dd" stroke-width="10" stroke-linecap="round"/>
      <line x1="24" y1="98" x2="210" y2="98" stroke="#ece7dd" stroke-width="10" stroke-linecap="round"/>
      <line x1="24" y1="126" x2="120" y2="126" stroke="#ece7dd" stroke-width="10" stroke-linecap="round"/>
      <rect x="20" y="300" width="210" height="42" rx="21" fill="#f6ead6" stroke="#bd7a2c" stroke-width="2"/>
