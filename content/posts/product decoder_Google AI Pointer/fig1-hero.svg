<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="620" fill="#f7f4ee"/>
  <text x="60" y="80" fill="#2c2a27" font-size="34" font-weight="700">The Interfaces of the AI Era</text>
  <text x="60" y="116" fill="#6b6560" font-size="20">Strip away the logo and the rounded corners — it is the same face.</text>

  <!-- four identical windows -->
  <g>
    <!-- window template repeated; only the top dot color (the "logo") differs -->
    <!-- w1 -->
    <g transform="translate(60,168)">
      <rect width="250" height="360" rx="14" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <circle cx="26" cy="30" r="8" fill="#5b9d6b"/>
      <text x="52" y="36" fill="#9c958c" font-size="15">Assistant A</text>
      <line x1="24" y1="70" x2="150" y2="70" stroke="#ece7dd" stroke-width="10" stroke-linecap="round"/>
      <line x1="24" y1="98" x2="210" y2="98" stroke="#ece7dd" stroke-width="10" stroke-linecap="round"/>
      <line x1="24" y1="126" x2="120" y2="126" stroke="#ece7dd" stroke-width="10" stroke-linecap="round"/>
      <!-- identical input bar, highlighted -->
      <rect x="20" y="300" width="210" height="42" rx="21" fill="#f6ead6" stroke="#bd7a2c" stroke-width="2"/>
      <text x="38" y="326" fill="#b08a5a" font-size="14">Type a message…</text>
      <circle cx="209" cy="321" r="13" fill="#bd7a2c"/>
      <path d="M204 321 h10 M210 316 l5 5 l-5 5" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- w2 -->
    <g transform="translate(340,168)">
      <rect width="250" height="360" rx="14" fill="#ffffff" stroke="#d9d2c6" stroke-width="2"/>
      <circle cx="26" cy="30" r="8" fill="#bd7a2c"/>
