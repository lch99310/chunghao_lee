theme = "congo"

# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/

baseURL = "https://lch99310.github.io/chunghao_lee/"
languageCode = "en"
defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 0

# Google Analytics 4
# 1. Go to https://analytics.google.com/ and create a GA4 property for this site
# 2. Copy your Measurement ID (format: G-XXXXXXXXXX)
# 3. Replace the value below and uncomment the line to enable tracking
googleAnalytics = "G-YP9BV0JJRH"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup.goldmark.renderer]
  unsafe = true
