theme = "congo"

# -- Site Configuration --
# https://jpanther.github.io/congo/docs/getting-started/
baseURL = "https://chunghaolee.com/"
languageCode = "en"
defaultContentLanguage = "en"
enableRobotsTXT = true
summaryLength = 70

# Google Analytics 4
googleAnalytics = "G-YP9BV0JJRH"

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'

# -- Markup / Goldmark / Math passthrough --
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)']]

# -- Congo theme parameters --
[params]
  [params.article]
    # NOTE: Congo's stock vendor.html only loads KaTeX when a page contains
    # the `{{< katex >}}` shortcode -- this `math` param is not actually
    # read by the theme for KaTeX loading. Per-page opt-in via front matter
    # `math: true` is implemented locally in layouts/_partials/extend-head.html.
    math = false
